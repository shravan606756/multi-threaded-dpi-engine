spring:
  application:
    name: dpi-analysis-backend

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # Spring AI - Groq Configuration
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
          max-tokens: 300

server:
  port: 8080
  servlet:
    context-path: /api

# DPI Engine Configuration
dpi:
  engine:
    # UPDATED: Matches your actual local Windows path
    dir: ${DPI_ENGINE_DIR:C:/Users/Shravan/Desktop/multi-threaded-dpi-engine/dpi-engine/Packet_analyzer-main/Packet_analyzer-main}
    binary: ${DPI_ENGINE_BINARY:dpi_engine.exe}

      # For Docker, override with environment variables:
      # DPI_ENGINE_DIR=/app/engine
      # DPI_ENGINE_BINARY=dpi_engine

    storage:
      input: ${DPI_ENGINE_STORAGE_INPUT:./storage/input}
      output: ${DPI_ENGINE_STORAGE_OUTPUT:./storage/output}

    default:
      threads: 4
      lbs: 1000
      fps: 5000

# Logging
logging:
  level:
    com.shravan.dpi.analysis: DEBUG
    org.springframework.ai: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"