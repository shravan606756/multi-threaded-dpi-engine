spring:
  application:
    name: dpi-analysis-backend

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # Spring AI - Groq Configuration
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
          max-tokens: 300

server:
  port: 8080
  servlet:
    context-path: /api

# DPI Engine Configuration
dpi:
  engine:

    dir: "../../dpi-engine/Packet_analyzer-main/Packet_analyzer-main"
    binary: "dpi_engine.exe"
    storage:

      input: "./storage/input"
      output: "./storage/output"
    default:
      threads: 4
      lbs: 1000
      fps: 5000

# Logging
logging:
  level:
    com.shravan.dpi.analysis: DEBUG
    org.springframework.ai: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"