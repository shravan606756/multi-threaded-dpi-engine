version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: dpi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  dpi-backend:
    build: .
    container_name: dpi-analysis-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - DPI_ENGINE_BINARY_PATH=/usr/local/bin/dpi_engine
    volumes:
      - ./dpi_engine:/usr/local/bin/dpi_engine:ro
      - dpi-storage:/tmp/dpi
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis-data:
  dpi-storage:
