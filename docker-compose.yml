services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      
      # Override DPI engine paths for Docker
      - DPI_ENGINE_DIR=/app/engine
      - DPI_ENGINE_BINARY=dpi_engine
      - DPI_ENGINE_STORAGE_INPUT=/app/storage/input
      - DPI_ENGINE_STORAGE_OUTPUT=/app/storage/output
      
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - redis
    networks:
      - dpi-network
    volumes:
      - ./storage:/app/storage

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - dpi-network
    volumes:
      - redis_data:/data

networks:
  dpi-network:
    driver: bridge

volumes:
  redis_data: